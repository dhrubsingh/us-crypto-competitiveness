# Daily data refresh: run the ingest (all sources are public and keyless;
# geo-blocked venues route through the deployed fra1 relay automatically),
# commit the updated snapshots, and push — which triggers the Vercel
# production deployment via the Git integration.
name: Daily ingest

on:
  schedule:
    - cron: '20 0 * * *' # 00:20 UTC, after venue UTC-day rollover
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run daily ingest
        run: npm run ingest

      - name: Commit and push data
        run: |
          git config user.name "observatory-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "data: daily ingest $(date -u +%F)"
          git pull --rebase origin main
          git push origin main
